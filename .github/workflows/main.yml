name: Phalcon Talon CI

on: [push, pull_request]

env:
  DATA_MYSQL_HOST: 127.0.0.1
  DATA_MYSQL_PORT: 3306
  DATA_MYSQL_USER: root
  DATA_MYSQL_PASS: secret
  DATA_MYSQL_NAME: talon
  DATA_MYSQL_CHARSET: utf8mb4
  DATA_POSTGRES_HOST: 127.0.0.1
  DATA_POSTGRES_PORT: 5432
  DATA_POSTGRES_USER: postgres
  DATA_POSTGRES_PASS: secret
  DATA_POSTGRES_NAME: talon
  DATA_POSTGRES_SCHEMA: public
  DATA_REDIS_HOST: 127.0.0.1
  DATA_REDIS_PORT: 6379
  DATA_REDIS_NAME: 1
  DATA_MEMCACHED_HOST: 127.0.0.1
  DATA_MEMCACHED_PORT: 11211
  DATA_MEMCACHED_WEIGHT: 0

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        variant:
          - 'v5'
          - 'v6'
    name: PHP ${{ matrix.php }} / Phalcon ${{ matrix.variant }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: talon
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      pgsql:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_USER: postgres
          POSTGRES_DB: talon
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7
        ports:
          - 6379:6379
      memcached:
        image: memcached:1.6
        ports:
          - 11211:11211
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: "pdo_mysql, pdo_pgsql, pdo_sqlite, sqlite3, intl, zip, memcached${{ matrix.variant == 'v5' && ', phalcon' || '' }}"
          coverage: pcov

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          if [ "${{ matrix.variant }}" = "v6" ]; then
            composer require --dev --no-interaction --no-progress "phalcon/phalcon:^6@dev"
          fi

      - name: Setup locales
        run: ./resources/linux-setup-locales.sh

      - name: Unit + sqlite
        run: composer test

      - name: Database drivers
        run: php bin/talon run mysql pgsql

      # Runtime-independent: run once on a single (v5) cell rather than all ten.
      - name: Static analysis, coding standard, layout
        if: matrix.variant == 'v5' && matrix.php == '8.3'
        run: |
          composer analyze
          composer cs
          composer cs-fixer

  sonarqube:
    name: Coverage & SonarQube
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: talon
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      pgsql:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_USER: postgres
          POSTGRES_DB: talon
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7
        ports:
          - 6379:6379
      memcached:
        image: memcached:1.6
        ports:
          - 11211:11211
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, pdo_pgsql, pdo_sqlite, sqlite3, intl, zip, memcached
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup locales
        run: ./resources/linux-setup-locales.sh

      - name: Tests with coverage
        run: composer test-coverage

      - name: Mutation testing
        run: composer test-mutation

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=phalcon
            -Dsonar.projectKey=phalcon_talon
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.exclusions=resources/**
            -Dsonar.php.coverage.reportPaths=tests/_output/coverage.xml

      - name: octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: ${{ github.event_name == 'pull_request' && 'resources/octocov.pr.yml' || 'resources/octocov.yml' }}
