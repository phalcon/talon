name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        variant: ['v5']
        include:
          - php: '8.5'
            variant: 'v6'
    name: PHP ${{ matrix.php }} / Phalcon ${{ matrix.variant }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          cp resources/.env.example .env
          sed -i "s/^UID=.*/UID=$(id -u)/" .env
          sed -i "s/^GID=.*/GID=$(id -g)/" .env
          PHP_VERSION=${{ matrix.php }} PHALCON_VARIANT=${{ matrix.variant }} docker compose build app

      - name: Unit + sqlite
        run: docker compose run --rm app composer test
        continue-on-error: ${{ matrix.variant == 'v6' }}

      - name: Database drivers
        run: |
          docker compose run --rm app vendor/bin/phpunit -c resources/phpunit.mysql.xml
          docker compose run --rm app vendor/bin/phpunit -c resources/phpunit.pgsql.xml
        continue-on-error: ${{ matrix.variant == 'v6' }}

      - name: Static analysis, coding standard, layout
        if: matrix.variant == 'v5' && matrix.php == '8.3'
        run: |
          docker compose run --rm -e TALON_WAIT_FOR_DB=0 app composer analyze
          docker compose run --rm -e TALON_WAIT_FOR_DB=0 app composer cs
