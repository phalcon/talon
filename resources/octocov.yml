# octocov configuration - https://github.com/k1LoW/octocov
#
# Default config: used on pushes (including the default branch).
# The gate here is a stable FLOOR only, so a coverage measurement blip on the
# default branch never red-Xs the build. Pull requests use octocov.pr.yml,
# which adds the no-regression (diff >= 0) ratchet on top of this floor.
# (octocov's `acceptable` cannot branch on is_pull_request, so the two gates
# live in separate files selected by the workflow.)
#
# Paths below are relative to THIS file's directory (resources/), not the
# repo root - octocov resolves them that way, so everything is prefixed `../`.
#
# `../tests/_output/coverage.xml` is generated by `composer test-coverage`
# in the "Tests with coverage" workflow step - the same file the SonarQube
# scan already reads, so the two dashboards never disagree with each other.
#
# Floor verified locally at 95.35% with redis/memcached unreachable (those
# tests skip rather than run in a plain local environment). CI runs redis
# and memcached as real service containers, so the actual CI coverage should
# be at or above this - if it comes in meaningfully higher, raise the floor
# to match.
coverage:
  paths:
    - ../tests/_output/coverage.xml
  acceptable: "current >= 95.0%"
  badge:
    path: ../tests/_output/coverage.svg
codeToTestRatio:
  code:
    - ../src/**/*.php
  test:
    - ../tests/**/*.php
testExecutionTime:
  steps:
    - Tests with coverage
comment:
  if: is_pull_request
summary:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
